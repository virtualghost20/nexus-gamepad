name: nexus_remote
description: A high-fidelity remote control system with customizable layouts and unlimited connectivity.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.1
  provider: ^6.1.1
  lucide_icons: ^0.1.2
  shared_preferences: ^2.2.2
  qr_flutter: ^4.1.0
  google_fonts: ^6.1.0
